worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format edge_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":"$status",'
            '"rate_limit_layer":"$sent_http_x_ratelimit_layer",'
            '"upstream_status":"$upstream_status"'
        '}';
    access_log /var/log/nginx/access.log edge_json;

    limit_req_zone $binary_remote_addr zone=auth_ip:10m rate=12r/m;
    limit_req_zone $binary_remote_addr zone=query_ip:10m rate=90r/m;
    limit_req_zone $binary_remote_addr zone=ingest_ip:10m rate=8r/m;

    upstream rag_backend {
        server host.docker.internal:8000;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name _;

        client_max_body_size 60m;
        limit_req_status 429;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 429 = @edge_rate_limited;

        location @edge_rate_limited {
            add_header Content-Type text/plain always;
            add_header Retry-After 60 always;
            add_header X-RateLimit-Layer edge always;
            return 429 "Too many requests (edge proxy).\n";
        }

        location = /auth/login {
            limit_req zone=auth_ip burst=4 nodelay;
            proxy_pass http://rag_backend;
        }

        location = /auth/register {
            limit_req zone=auth_ip burst=2 nodelay;
            proxy_pass http://rag_backend;
        }

        location ~ ^/workspaces/[0-9a-fA-F-]+/query$ {
            limit_req zone=query_ip burst=20 nodelay;
            proxy_pass http://rag_backend;
        }

        location ~ ^/workspaces/[0-9a-fA-F-]+/ingest$ {
            limit_req zone=ingest_ip burst=2 nodelay;
            proxy_pass http://rag_backend;
        }

        location / {
            proxy_pass http://rag_backend;
        }
    }
}
