name: LLM Generation Security

on:
  schedule:
    - cron: "40 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  garak-llm-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    env:
      RAG_AUTH_DISABLED: "1"
      RAG_USE_LLM: "1"
      RAG_EMBEDDING_BACKEND: hash
      RAG_OTEL_ENABLED: "0"
      RAG_QUERY_RATE_LIMIT_ENABLED: "0"
      RAG_LLM_CTX: "512"
      RAG_LLM_THREADS: "2"
      RAG_GARAK_ARTIFACT_DIR: artifacts/garak-llm
      RAG_GARAK_SUMMARY_FILE: artifacts/garak-llm/garak-summary.json
      RAG_GARAK_REPORT_DIR: /tmp/rag-garak-llm-raw
      RAG_GARAK_KEEP_RAW_ARTIFACTS: "0"
      CI_LLM_MODEL_DIR: /tmp/rag-ci-model
      CI_LLM_MODEL_REPO: TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF
      CI_LLM_MODEL_FILE: tinyllama-1.1b-chat-v1.0.Q2_K.gguf
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies (with llama.cpp)
        run: uv pip install --system -e "backend/.[dev,llm]"

      - name: Install garak
        run: python -m pip install "garak==0.13.2"

      - name: Download CI GGUF model
        run: |
          mkdir -p "$CI_LLM_MODEL_DIR"
          uvx --from huggingface_hub hf download \
            "$CI_LLM_MODEL_REPO" \
            "$CI_LLM_MODEL_FILE" \
            --local-dir "$CI_LLM_MODEL_DIR"
          test -s "$CI_LLM_MODEL_DIR/$CI_LLM_MODEL_FILE"
          echo "ci_llm_model_size_bytes=$(wc -c <"$CI_LLM_MODEL_DIR/$CI_LLM_MODEL_FILE")"

      - name: Export model path
        run: echo "RAG_LLM_MODEL_PATH=$CI_LLM_MODEL_DIR/$CI_LLM_MODEL_FILE" >> "$GITHUB_ENV"

      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 >/tmp/rag-garak-llm-backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for attempt in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to become healthy. Backend log output is withheld for compliance."
          exit 1

      - name: Run garak scan
        run: ./scripts/run_garak_scan.sh

      - name: Upload sanitized garak summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: garak-llm-summary
          path: artifacts/garak-llm/garak-summary.json
          if-no-files-found: warn

      - name: Show backend log metadata on failure
        if: failure()
        run: |
          if [ -f /tmp/rag-garak-llm-backend.log ]; then
            echo "backend_log_bytes=$(wc -c </tmp/rag-garak-llm-backend.log)"
          else
            echo "backend_log_missing=true"
          fi
