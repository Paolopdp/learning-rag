name: Query Security Baseline

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  garak-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      RAG_AUTH_DISABLED: "1"
      # Retrieval-mode baseline only. LLM-generation security coverage requires a model-backed job.
      RAG_USE_LLM: "0"
      RAG_EMBEDDING_BACKEND: hash
      RAG_OTEL_ENABLED: "0"
      RAG_QUERY_RATE_LIMIT_ENABLED: "0"
      RAG_GARAK_REPORT_DIR: /tmp/rag-garak-raw
      RAG_GARAK_KEEP_RAW_ARTIFACTS: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: uv pip install --system -e "backend/.[dev]"

      - name: Install garak
        run: python -m pip install "garak==0.13.2"

      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 >/tmp/rag-garak-backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for attempt in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to become healthy. Backend log output is withheld for compliance."
          exit 1

      - name: Run garak scan
        run: ./scripts/run_garak_scan.sh

      - name: Upload sanitized garak summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: garak-summary
          path: artifacts/garak/garak-summary.json
          if-no-files-found: warn

      - name: Show backend log metadata on failure
        if: failure()
        run: |
          if [ -f /tmp/rag-garak-backend.log ]; then
            echo "backend_log_bytes=$(wc -c </tmp/rag-garak-backend.log)"
          else
            echo "backend_log_missing=true"
          fi
